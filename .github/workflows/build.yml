name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: |
          docker run --rm \
            -v $PWD:/home/user/hostcwd \
            -v $HOME/.buildozer:/home/user/.buildozer \
            ghcr.io/kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xauusd-apk
          path: bin/*.apk
