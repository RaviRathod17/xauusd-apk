name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with official Buildozer
        run: |
          docker run --rm \
            --entrypoint bash \
            -v $PWD:/home/user/hostcwd \
            kivy/buildozer:latest \
            -c "yes | sdkmanager --licenses > /dev/null && buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: xauusd-apk
          path: bin/*.apk
